  #     OMNIPAXOS_SERVER_ADDRESS: "s2:8000" # Overwrite server_address in client config TOML
  #   volumes:
  #     - ./client-2-config.toml:/app/client-config.toml
  #     - ./logs/:/app/logs/

  jepsen:
    image: omnipaxos-jepsen
    build:
      context: ./../../omnipaxos-jepsen
      dockerfile: jepsen.dockerfile
    container_name: jepsen
    volumes:
      - "./../../omnipaxos-jepsen/store:/app/store"